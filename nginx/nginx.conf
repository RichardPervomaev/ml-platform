events {}

http {
    server {
        listen 80;

        location / {
            proxy_pass http://api:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /mlflow/ {
            rewrite ^/mlflow/(.*)$ /$1 break;
            proxy_pass http://mlflow:5000/;
        }
    }
}

